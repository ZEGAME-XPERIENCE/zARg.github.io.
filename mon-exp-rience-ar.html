body{margin:0;font-family:sans-serif;overflow:hidden;background:#000}
#ui{position:fixed;inset:0;pointer-events:none;z-index:100}

#close-instr{background:#6B2D8B;border:none;color:white;padding:10px 20px;border-radius:20px;width:100%;margin-top:10px;cursor:pointer;font-size:14px;font-weight:600}

</style>

<script>

const marker = document.querySelector('#markerEl');
const status = document.getElementById('status');
const ctaBtn = document.getElementById('ctaBtn');
if(marker){
  marker.addEventListener('markerFound', ()=>{
    document.getElementById('status-icon').textContent='✅';
    document.getElementById('status-text').textContent='Expérience AR active !';
    setTimeout(()=>status.style.display='none',1500);
    if(ctaBtn) ctaBtn.style.display='block';
  });
  marker.addEventListener('markerLost', ()=>{
    status.style.display='';
    document.getElementById('status-icon').textContent='🔍';
    document.getElementById('status-text').textContent='Cherche le marqueur AR…';
    if(ctaBtn) ctaBtn.style.display='none';
  });
}
function captureAR(){
  const canvas=document.querySelector('canvas');
  if(!canvas) return alert('Capture non disponible');
  const link=document.createElement('a');
  link.download='ar-capture.png';
  link.href=canvas.toDataURL();
  link.click();
}
</script>
